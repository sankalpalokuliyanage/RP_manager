<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research OS | Advanced Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #00d4ff; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navbar & Sidebar style */
        .sidebar { height: 100vh; background: #0c0c0e; border-right: 1px solid #222; position: fixed; width: 250px; padding: 20px; }
        .main-content { margin-left: 250px; padding: 40px; }
        
        /* Card Style */
        .paper-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 20px; transition: 0.3s; margin-bottom: 20px; }
        .paper-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 212, 255, 0.1); }
        
        /* Note Editor */
        .editor-panel { border-left: 1px solid #222; height: 100vh; position: fixed; right: 0; width: 400px; background: #0c0c0e; padding: 20px; display: none; }
        .note-input { background: transparent; border: none; color: #ccc; width: 100%; height: 80%; outline: none; font-size: 14px; line-height: 1.6; }
        
        .btn-cyber { background: var(--accent); color: #000; font-weight: 800; border-radius: 4px; border: none; padding: 8px 20px; }
        .topic-pill { font-size: 10px; background: #1e293b; color: var(--accent); padding: 4px 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar d-none d-lg-block">
    <h4 class="fw-bold mb-4">VAULT <span class="text-info">v2</span></h4>
    <div class="mb-4">
        <small class="text-uppercase text-muted">Quick Access</small>
        <div class="mt-2 d-grid gap-2">
            <button class="btn btn-dark text-start btn-sm" onclick="filterPapers('ALL')">All Papers</button>
            <div id="topicFilterList"></div>
        </div>
    </div>
    <button class="btn btn-cyber w-100 mt-5" data-bs-toggle="modal" data-bs-target="#uploadModal">NEW RESEARCH</button>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <input type="text" id="searchBar" class="form-control w-50 bg-dark text-white border-0" placeholder="Search by title or topic..." onkeyup="search()">
    </div>

    <div id="paperGrid" class="row">
        </div>
</div>

<div id="editor" class="editor-panel">
    <div class="d-flex justify-content-between mb-3 border-bottom pb-2 border-secondary">
        <h6 id="editorTitle" class="m-0">Research Notes</h6>
        <button class="btn btn-sm btn-outline-danger border-0" onclick="closeEditor()">X</button>
    </div>
    <textarea id="noteInput" class="note-input" placeholder="Start typing your findings..."></textarea>
    <div class="text-end mt-2"><small class="text-success" id="saveStatus">Auto-saved</small></div>
</div>

<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-body p-4">
                <h6>Add Paper</h6>
                <input type="text" id="topicIn" class="form-control bg-secondary text-white border-0 my-3" placeholder="Topic (e.g. YOLO, PPO)">
                <input type="file" id="fileIn" class="form-control bg-secondary text-white border-0">
                <button onclick="handleUpload()" id="upBtn" class="btn btn-info w-100 mt-4 fw-bold text-dark">UPLOAD</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClhkIr-98T9UTKoEQBB-Of2i2Xzo3aCHk",
        authDomain: "papermanager-app.firebaseapp.com",
        projectId: "papermanager-app",
        storageBucket: "papermanager-app.firebasestorage.app",
        messagingSenderId: "887083706575",
        appId: "1:887083706575:web:68587c925444746fffafba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpyn5w9rEdYOzvchJmVNJeIv4lEcM2V0P-3KcqnoRl7TsClXBGaGmeQAN66s39t-kd/exec";
    let activePaperId = null;

    // Real-time Load
    onSnapshot(query(collection(db, "papers"), orderBy("createdAt", "desc")), (snap) => {
        const grid = document.getElementById('paperGrid');
        grid.innerHTML = '';
        snap.forEach(docSnap => {
            const data = docSnap.data();
            grid.innerHTML += `
                <div class="col-md-6 paper-item" data-title="${data.title.toLowerCase()}" data-topic="${data.topic.toLowerCase()}">
                    <div class="paper-card">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="topic-pill">${data.topic}</span>
                            <div class="d-flex gap-2">
                                <a href="${data.link}" target="_blank" class="text-info"><i data-lucide="link"></i></a>
                                <button onclick="openEditor('${docSnap.id}', '${data.title.replace(/'/g, "\\'")}', \`${data.notes}\`)" class="btn btn-sm p-0 text-white"><i data-lucide="edit-3"></i></button>
                            </div>
                        </div>
                        <h6 class="fw-bold mb-1">${data.title}</h6>
                        <p class="small text-muted line-clamp-1">${data.notes ? data.notes.substring(0, 50) + '...' : 'No notes yet.'}</p>
                    </div>
                </div>
            `;
        });
        lucide.createIcons();
    });

    window.handleUpload = async () => {
        const file = document.getElementById('fileIn').files[0];
        const topic = document.getElementById('topicIn').value || "GENERAL";
        const upBtn = document.getElementById('upBtn');
        if(!file) return;

        upBtn.innerText = "UPLOADING...";
        upBtn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const driveRes = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ base64: base64, type: file.type, name: file.name })
                });
                const driveData = await driveRes.json();
                
                if(driveData.status === "success") {
                    // Firestore සේව් කිරීම (මෙතනදී තමයි වැදගත්ම කොටස)
                    await addDoc(collection(db, "papers"), {
                        title: file.name,
                        topic: topic.toUpperCase(),
                        link: driveData.link,
                        notes: "",
                        createdAt: serverTimestamp()
                    });
                    location.reload();
                }
            } catch (err) { alert("Error: " + err.message); }
        };
    };

    // Note Editor Functions
    window.openEditor = (id, title, notes) => {
        activePaperId = id;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('editorTitle').innerText = title;
        document.getElementById('noteInput').value = notes === "undefined" ? "" : notes;
    };

    window.closeEditor = () => { document.getElementById('editor').style.display = 'none'; };

    // Auto-save Notes
    document.getElementById('noteInput').addEventListener('input', async (e) => {
        if(!activePaperId) return;
        document.getElementById('saveStatus').innerText = "Saving...";
        await updateDoc(doc(db, "papers", activePaperId), { notes: e.target.value });
        document.getElementById('saveStatus').innerText = "Saved";
    });

    // Search function
    window.search = () => {
        const q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.paper-item').forEach(el => {
            const match = el.dataset.title.includes(q) || el.dataset.topic.includes(q);
            el.style.display = match ? 'block' : 'none';
        });
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
