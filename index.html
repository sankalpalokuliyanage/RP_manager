<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research OS v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #050505; --card: #121214; --accent: #00d4ff; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar { height: 100vh; background: #0c0c0e; border-right: 1px solid #222; position: fixed; width: 260px; padding: 25px; z-index: 100; }
        .main-content { margin-left: 260px; padding: 40px; }
        .paper-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 20px; transition: 0.3s; margin-bottom: 20px; cursor: pointer; }
        .paper-card:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,212,255,0.1); }
        .editor-panel { border-left: 1px solid #222; height: 100vh; position: fixed; right: 0; top: 0; width: 450px; background: #0c0c0e; padding: 25px; display: none; z-index: 1000; }
        .note-input { background: transparent; border: none; color: #cbd5e1; width: 100%; height: 70%; outline: none; font-size: 14px; resize: none; margin-top: 20px; }
        .btn-cyber { background: var(--accent); color: #000; font-weight: 800; border-radius: 6px; border: none; padding: 10px 20px; width: 100%; transition: 0.2s; }
        .btn-cyber:disabled { background: #333; color: #777; }
        .topic-pill { font-size: 10px; background: rgba(0, 212, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold mb-5 text-info italic">VAULT <span class="text-white">PRO</span></h4>
    <div class="mb-4 text-muted small fw-bold uppercase tracking-wider">Workspace</div>
    <div class="d-grid gap-2">
        <button class="btn btn-dark text-start border-0 py-2" onclick="location.reload()">All Research</button>
    </div>
    <button class="btn btn-cyber mt-5" data-bs-toggle="modal" data-bs-target="#uploadModal">NEW RESEARCH</button>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <input type="text" id="searchBar" class="form-control w-50 bg-dark text-white border-0 py-2" placeholder="Filter by Topic or Title..." onkeyup="search()">
    </div>
    <div id="paperGrid" class="row">
        <div class="text-center py-5"><div class="spinner-border text-info"></div></div>
    </div>
</div>

<div id="editor" class="editor-panel">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <h6 id="editorTitle" class="m-0 fw-bold text-info">Analysis</h6>
        <button class="btn btn-sm btn-dark rounded-circle" onclick="closeEditor()"><i data-lucide="x" size="16"></i></button>
    </div>
    <a id="pdfLink" href="#" target="_blank" class="btn btn-outline-info btn-sm w-100 mb-3">View Full Document</a>
    <textarea id="noteInput" class="note-input" placeholder="Start your research notes here..."></textarea>
    <div class="text-end mt-3"><span id="saveStatus" class="badge bg-info text-dark opacity-75">Ready</span></div>
</div>

<div class="modal fade" id="uploadModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary shadow-lg">
            <div class="modal-body p-4">
                <h6 class="mb-4 fw-bold">Import PDF to Vault</h6>
                <input type="text" id="topicIn" class="form-control bg-secondary text-white border-0 mb-3" placeholder="Topic (e.g., ML, Physics)">
                <input type="file" id="fileIn" class="form-control bg-secondary text-white border-0 mb-4" accept=".pdf">
                <button onclick="handleUpload()" id="upBtn" class="btn btn-info w-100 fw-bold text-dark py-2">PUSH TO CLOUD</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClhkIr-98T9UTKoEQBB-Of2i2Xzo3aCHk",
        authDomain: "papermanager-app.firebaseapp.com",
        projectId: "papermanager-app",
        storageBucket: "papermanager-app.firebasestorage.app",
        messagingSenderId: "887083706575",
        appId: "1:887083706575:web:68587c925444746fffafba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyae7rRVYGoaGKBwduDGR4_Mu8zFeDwImb_xBT5U2rfCgKsOQxOOYO92qbvaHdOfjE/exec";
    let activePaperId = null;

    onSnapshot(query(collection(db, "papers"), orderBy("createdAt", "desc")), (snap) => {
        const grid = document.getElementById('paperGrid');
        grid.innerHTML = snap.empty ? '<div class="text-center text-muted py-5">Empty Workspace</div>' : '';
        snap.forEach(docSnap => {
            const data = docSnap.data();
            grid.innerHTML += `
                <div class="col-md-6 mb-3 paper-item" data-title="${data.title.toLowerCase()}" data-topic="${data.topic.toLowerCase()}">
                    <div class="paper-card" onclick="openEditor('${docSnap.id}', '${data.title.replace(/'/g, "\\'")}', \`${data.notes}\`, '${data.link}')">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="topic-pill">${data.topic}</span>
                            <i data-lucide="chevron-right" class="text-muted" size="16"></i>
                        </div>
                        <h6 class="fw-bold mb-1">${data.title}</h6>
                    </div>
                </div>`;
        });
        lucide.createIcons();
    });

    window.handleUpload = async () => {
        const file = document.getElementById('fileIn').files[0];
        const topic = document.getElementById('topicIn').value || "GENERAL";
        const upBtn = document.getElementById('upBtn');
        if(!file) return alert("Please select a file first.");

        upBtn.innerText = "UPLOADING...";
        upBtn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ base64, type: file.type, name: file.name })
                });
                const drive = await res.json();
                
                if(drive.status === "success") {
                    await addDoc(collection(db, "papers"), {
                        title: file.name,
                        topic: topic.toUpperCase(),
                        link: drive.link,
                        notes: "",
                        createdAt: serverTimestamp()
                    });
                    bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                } else {
                    alert("Drive Error: " + drive.error);
                }
            } catch (err) {
                alert("Upload failed. Make sure Apps Script is deployed as 'Anyone'.");
            } finally {
                upBtn.innerText = "PUSH TO CLOUD";
                upBtn.disabled = false;
            }
        };
    };

    window.openEditor = (id, title, notes, link) => {
        activePaperId = id;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('editorTitle').innerText = title;
        document.getElementById('noteInput').value = notes === "undefined" ? "" : notes;
        document.getElementById('pdfLink').href = link;
    };

    window.closeEditor = () => { document.getElementById('editor').style.display = 'none'; };

    document.getElementById('noteInput').addEventListener('input', async (e) => {
        if(!activePaperId) return;
        document.getElementById('saveStatus').innerText = "Saving...";
        await updateDoc(doc(db, "papers", activePaperId), { notes: e.target.value });
        document.getElementById('saveStatus').innerText = "Saved";
    });

    window.search = () => {
        const q = document.getElementById('searchBar').value.toLowerCase();
        document.querySelectorAll('.paper-item').forEach(el => {
            el.style.display = (el.dataset.title.includes(q) || el.dataset.topic.includes(q)) ? 'block' : 'none';
        });
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
